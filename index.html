<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Luxury Reclaim</title>

  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="style.css">
</head>

<body>

<!-- HEADER (NO LOGO) -->
<header>
  <div class="brand-name">LUXURY RECLAIM</div>

  <nav>
    <a href="index.html">Home</a>
    <a href="#brands">Brands</a>
    <a href="contact.html">Contact</a>
    <a href="cart.html">Cart <span id="cartCount">0</span></a>
  </nav>
</header>

<!-- HERO -->
<section class="hero">
  <div class="hero-inner">
    <h1 class="title">Luxury Reclaim</h1>
    <p class="subtitle" id="subtitle">Timeless Luxury</p>
    <button onclick="scrollToBrands()">Explore Collection</button>
  </div>
</section>

<!-- BRANDS -->
<section class="brands" id="brands">
  <h2>HOUSE SELECTION</h2>

  <div class="brand-grid">

    <div class="brand-card">
      <h3>Balenciaga</h3>
      <div class="product" onclick="addToCart('Balenciaga Hoodie', 890)">Hoodie — $890</div>
      <div class="product" onclick="addToCart('Balenciaga Jacket', 1200)">Jacket — $1200</div>
    </div>

    <div class="brand-card">
      <h3>Gucci</h3>
      <div class="product" onclick="addToCart('Gucci Sneakers', 950)">Sneakers — $950</div>
      <div class="product" onclick="addToCart('Gucci Bag', 1500)">Bag — $1500</div>
    </div>

    <div class="brand-card">
      <h3>Louis Vuitton</h3>
      <div class="product" onclick="addToCart('LV Denim', 1100)">Denim — $1100</div>
      <div class="product" onclick="addToCart('LV Coat', 1800)">Coat — $1800</div>
    </div>

  </div>
</section>

<script src="script.js"></script>
</body>
</html>
